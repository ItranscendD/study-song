<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudySong — Generation Error</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:            var(--surface-bg);
      --surface:       var(--surface-card);
      --surface-2:     var(--surface-elevated);
      --accent:        var(--color-primary);
      --accent-soft:   var(--color-primary-soft);
      --error-soft:    rgba(255, 107, 107, 0.12);
      --error-border:  rgba(255, 107, 107, 0.3);
      --radius-card:   var(--radius-xl);
    }

    html, body { height: 100%; background: #08080A; }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Phone shell ── */
    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 44px;
      border: 8px solid #222;
      box-shadow: 0 0 80px rgba(0,0,0,0.7), inset 0 0 0 1px #333;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Ambient glow — switches to red on error ── */
    .ambient {
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 300px 240px at 50% 20%,
        rgba(124,77,255,0.18) 0%, transparent 70%);
      transition: background 0.8s ease;
      pointer-events: none;
      z-index: 0;
    }
    .ambient.errored {
      background: radial-gradient(ellipse 300px 240px at 50% 20%,
        rgba(255,107,107,0.14) 0%, transparent 70%);
    }

    /* ── Header ── */
    .player-header {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }
    .btn-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
    }
    .btn-icon svg { width: 18px; height: 18px; }
    .header-label {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
    }

    /* ── Main content (sits behind the sheet) ── */
    .player-body {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px 0;
      gap: 6px;
    }

    .track-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--text-primary);
      text-align: center;
    }
    .track-meta {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 16px;
    }

    /* ── Generating label ── */
    .gen-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 20px;
      transition: color 0.5s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .gen-label.errored { color: var(--color-error); }

    .gen-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: dotBlink 1s ease-in-out infinite;
    }
    .gen-label.errored .gen-dot { animation: none; }

    @keyframes dotBlink {
      0%, 100% { opacity: 1; } 50% { opacity: 0.2; }
    }

    /* ── Waveform ── */
    .waveform-wrap {
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: wave var(--dur) ease-in-out infinite alternate;
      transform-origin: center;
      transition: background 0.4s ease, height 0.4s ease;
    }

    @keyframes wave {
      from { transform: scaleY(0.3); opacity: 0.5; }
      to   { transform: scaleY(1);   opacity: 1; }
    }

    /* Frozen — all bars same height, red flash */
    .waveform-wrap.frozen .bar {
      animation: none;
      transform: scaleY(0.3);
      opacity: 0.6;
    }
    .waveform-wrap.flash .bar  { background: var(--color-error); }
    .waveform-wrap.errored .bar {
      background: rgba(255,107,107,0.35);
      transform: scaleY(0.18);
      opacity: 0.4;
    }

    /* ── Progress track (dimmed) ── */
    .progress-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .time { font-size: 12px; color: var(--text-muted); min-width: 28px; }
    .time.right { text-align: right; }
    .prog-track {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--surface-2);
      position: relative;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 2px;
      transition: background 0.5s ease;
    }
    .prog-fill.errored { background: rgba(255,107,107,0.4); }

    /* ── Bottom dimmed controls ── */
    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      opacity: 0.25;
      pointer-events: none;
    }
    .btn-ctrl {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: none;
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
    }
    .btn-ctrl.main {
      width: 58px; height: 58px;
      background: var(--accent);
    }
    .btn-ctrl svg { width: 18px; height: 18px; }
    .btn-ctrl.main svg { width: 22px; height: 22px; }

    /* ══════════════════════════════════
       ERROR BOTTOM SHEET
    ══════════════════════════════════ */
    .error-sheet {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 16px 32px;
      transform: translateY(110%);
      transition: transform 0.45s cubic-bezier(0.34, 1.10, 0.64, 1);
    }
    .error-sheet.visible { transform: translateY(0); }

    /* Sheet card */
    .error-card {
      background: var(--surface);
      border-radius: var(--radius-card);
      border: 1px solid var(--error-border);
      padding: 24px 20px 20px;
      box-shadow:
        0 -8px 40px rgba(255,107,107,0.12),
        0 4px 60px rgba(0,0,0,0.6);
    }

    /* Drag handle */
    .sheet-handle {
      width: 36px; height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,0.12);
      margin: 0 auto 20px;
    }

    /* Error icon badge */
    .err-icon-badge {
      width: 52px; height: 52px;
      border-radius: 16px;
      background: var(--error-soft);
      border: 1px solid var(--error-border);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
    }
    .err-icon-badge svg { width: 26px; height: 26px; color: var(--color-error); }

    .err-headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: var(--text-primary);
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .err-body {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.55;
      margin-bottom: 24px;
      max-width: 280px;
    }

    /* Error code pill */
    .err-code {
      display: inline-block;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.18);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 11px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      color: rgba(255,107,107,0.7);
      letter-spacing: 0.3px;
      margin-bottom: 20px;
      display: block;
    }

    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Primary CTA */
    .btn-primary {
      width: 100%;
      padding: 16px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 8px 24px rgba(124,77,255,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-20deg);
      animation: shine 3s ease-in-out infinite;
    }
    @keyframes shine { 0%{left:-100%} 25%{left:180%} 100%{left:180%} }
    .btn-primary:hover  { transform: translateY(-1px); box-shadow: 0 12px 30px rgba(124,77,255,0.5); }
    .btn-primary:active { transform: translateY(1px); }

    .btn-primary svg { width: 16px; height: 16px; }

    /* Ghost CTA */
    .btn-ghost {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius-pill);
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.12);
      font-family: 'DM Sans', sans-serif;
      font-weight: 500;
      font-size: 15px;
      cursor: pointer;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-ghost:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); border-color: rgba(255,255,255,0.2); }
    .btn-ghost svg { width: 15px; height: 15px; }

    /* ── Mobile fallback ── */
    @media (max-width: 430px) {
      html, body { background: var(--bg); }
      .phone { width: 100%; height: 100dvh; border-radius: 0; border: none; box-shadow: none; }
    }
  </style>
</head>
<body>
<div class="phone" id="phone">

  <!-- Ambient glow -->
  <div class="ambient" id="ambient"></div>

  <!-- Header -->
  <header class="player-header">
    <button class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="header-label">Generating…</span>
    <button class="btn-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
    </button>
  </header>

  <!-- Player body -->
  <div class="player-body">
    <h1 class="track-title">Photosynthesis Banger</h1>
    <p class="track-meta">Biology • Pop • 2020s</p>

    <div class="gen-label" id="genLabel">
      <span class="gen-dot"></span>
      Generating your song
    </div>

    <!-- Waveform -->
    <div class="waveform-wrap" id="waveform"></div>

    <!-- Progress -->
    <div class="progress-row">
      <span class="time">0:14</span>
      <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
      <span class="time right">2:08</span>
    </div>

    <!-- Dimmed controls -->
    <div class="controls-row">
      <button class="btn-ctrl">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="11 19 2 12 11 5 11 19"/><polygon points="22 19 13 12 22 5 22 19"/></svg>
      </button>
      <button class="btn-ctrl main">
        <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      </button>
      <button class="btn-ctrl">
        <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="13 19 22 12 13 5 13 19"/><polygon points="2 19 11 12 2 5 2 19"/></svg>
      </button>
    </div>
  </div>

  <!-- Error bottom sheet -->
  <div class="error-sheet" id="errorSheet">
    <div class="error-card">
      <div class="sheet-handle"></div>

      <div class="err-icon-badge">
        <!-- X-circle icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="15" y1="9" x2="9" y2="15"/>
          <line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>

      <h2 class="err-headline">Something went wrong</h2>
      <p class="err-body">We couldn't finish generating your song. This usually happens due to a connection hiccup. Your notes are safe — just try again.</p>
      <span class="err-code">ERR_GENERATION_TIMEOUT · 45s</span>

      <div class="btn-row">
        <button class="btn-primary" id="btnTryAgain">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Try again
        </button>
        <button class="btn-ghost" id="btnEditNotes" onclick="window.location.href='input.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          Edit notes
        </button>
      </div>
    </div>
  </div>

</div>

<script>
  /* ── Build waveform bars ── */
  const wf = document.getElementById('waveform');
  const BAR_COUNT = 52;
  const heights = [];

  for (let i = 0; i < BAR_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const h = 16 + Math.random() * 56;
    heights.push(h);
    bar.style.height = h + 'px';
    bar.style.setProperty('--dur', (0.5 + Math.random() * 0.8) + 's');
    bar.style.animationDelay = (Math.random() * 0.6) + 's';
    wf.appendChild(bar);
  }

  /* ── Trigger error sequence ── */
  function triggerError() {
    const ambient   = document.getElementById('ambient');
    const genLabel  = document.getElementById('genLabel');
    const progFill  = document.getElementById('progFill');
    const sheet     = document.getElementById('errorSheet');

    // Step 1: freeze waveform
    wf.classList.add('frozen');

    // Step 2: red flash (200ms)
    setTimeout(() => {
      wf.classList.add('flash');
    }, 300);

    // Step 3: remove flash, apply errored tint
    setTimeout(() => {
      wf.classList.remove('flash');
      wf.classList.add('errored');
      ambient.classList.add('errored');
      genLabel.classList.add('errored');
      genLabel.innerHTML = '<span class="gen-dot"></span> Generation failed';
      progFill.classList.add('errored');
    }, 700);

    // Step 4: slide error sheet up
    setTimeout(() => {
      sheet.classList.add('visible');
    }, 1100);
  }

  // Auto-trigger after 1.4s so user sees the generating state first
  setTimeout(triggerError, 1400);

  // "Try again" resets demo
  document.getElementById('btnTryAgain').addEventListener('click', () => {
    location.reload();
  });
</script>
</body>
</html>
