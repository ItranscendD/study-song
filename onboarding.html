<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudySong - Onboarding</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <div class="onboarding-container">
    <header class="onboarding-header">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="header-content">
        <span class="step-indicator" id="stepIndicator">1/3</span>
        <button class="btn-skip">Skip</button>
      </div>
    </header>

    <main class="steps-container">
      <!-- Step 1 -->
      <section class="step active" id="step1">
        <h1 class="title">What do you study?</h1>
        <p class="subtitle">Select the subjects you're focusing on.</p>
        <div class="subject-grid">
          <div class="subject-card">
            <span class="icon">🧬</span>
            <span class="label">Biology</span>
          </div>
          <div class="subject-card">
            <span class="icon">🏛️</span>
            <span class="label">History</span>
          </div>
          <div class="subject-card">
            <span class="icon">⚖️</span>
            <span class="label">Law</span>
          </div>
          <div class="subject-card">
            <span class="icon">🗣️</span>
            <span class="label">Languages</span>
          </div>
          <div class="subject-card">
            <span class="icon">📐</span>
            <span class="label">Math</span>
          </div>
          <div class="subject-card">
            <span class="icon">💻</span>
            <span class="label">Comp Sci</span>
          </div>
        </div>
      </section>

      <!-- Step 2 -->
      <section class="step" id="step2">
        <h1 class="title">What's your vibe?</h1>
        <p class="subtitle">Choose the genres that help you focus.</p>
        <div class="genre-scroll">
          <div class="genre-tile pop">
            <div class="check-icon"></div>
            <span class="genre-name">Pop</span>
          </div>
          <div class="genre-tile afrobeats">
            <div class="check-icon"></div>
            <span class="genre-name">Afrobeats</span>
          </div>
          <div class="genre-tile hip-hop">
            <div class="check-icon"></div>
            <span class="genre-name">Hip-hop</span>
          </div>
          <div class="genre-tile rb">
            <div class="check-icon"></div>
            <span class="genre-name">R&B</span>
          </div>
          <div class="genre-tile amapiano">
            <div class="check-icon"></div>
            <span class="genre-name">Amapiano</span>
          </div>
          <div class="genre-tile gospel">
            <div class="check-icon"></div>
            <span class="genre-name">Gospel</span>
          </div>
        </div>
      </section>

      <!-- Step 3 -->
      <section class="step" id="step3">
        <h1 class="title">How do you want to feel?</h1>
        <p class="subtitle">Set the mood for your study session.</p>
        <div class="mood-pills">
          <button class="mood-pill">Calm</button>
          <button class="mood-pill">Catchy</button>
          <button class="mood-pill">Emotional</button>
          <button class="mood-pill">Hype</button>
        </div>
      </section>
    </main>

    <footer class="onboarding-footer">
      <button class="btn-primary" id="nextBtn">Continue</button>
    </footer>
  </div>
  <script type="module" src="onboarding.js"></script>
</body>
</html>
