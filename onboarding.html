<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudySong - Onboarding</title>
  <link rel="stylesheet" href="onboarding.css">
</head>
<body>
  <div class="onboarding-container">
    <header class="onboarding-header">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="header-content">
        <span class="step-indicator" id="stepIndicator">1/3</span>
        <button class="btn-skip">Skip</button>
      </div>
    </header>

    <main class="steps-container">
      <!-- Step 1 -->
      <section class="step active" id="step1">
        <h1 class="title">What do you study?</h1>
        <p class="subtitle">Select the subjects you're focusing on.</p>
        <div class="subject-grid">
          <div class="subject-card">
            <span class="icon">🧬</span>
            <span class="label">Biology</span>
          </div>
          <div class="subject-card">
            <span class="icon">🏛️</span>
            <span class="label">History</span>
          </div>
          <div class="subject-card">
            <span class="icon">⚖️</span>
            <span class="label">Law</span>
          </div>
          <div class="subject-card">
            <span class="icon">🗣️</span>
            <span class="label">Languages</span>
          </div>
          <div class="subject-card">
            <span class="icon">📐</span>
            <span class="label">Math</span>
          </div>
          <div class="subject-card">
            <span class="icon">💻</span>
            <span class="label">Comp Sci</span>
          </div>
        </div>
      </section>

      <!-- Step 2 -->
      <section class="step" id="step2">
        <h1 class="title">What's your vibe?</h1>
        <p class="subtitle">Choose the genres that help you focus.</p>
        <div class="genre-scroll">
          <div class="genre-tile pop">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <circle cx="60" cy="60" r="45" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.25"/>
                <circle cx="60" cy="60" r="30" stroke-width="1" opacity="0.35"/>
                <path d="M60 12 L64.5 45.5 L98 50 L64.5 54.5 L60 88 L55.5 54.5 L22 50 L55.5 45.5 Z" stroke-width="2" fill="rgba(255,255,255,0.1)"/>
                <path d="M85 25 L86 31 L92 32 L86 33 L85 39 L84 33 L78 32 L84 31 Z" fill="currentColor" opacity="0.6"/>
                <path d="M35 75 L36 81 L42 82 L36 83 L35 89 L34 83 L28 82 L34 81 Z" fill="currentColor" opacity="0.4"/>
              </svg>
            </div>
            <span class="genre-name">Pop</span>
          </div>
          <div class="genre-tile afrobeats">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <circle cx="60" cy="45" r="40" stroke-width="1" stroke-dasharray="6 3" opacity="0.2"/>
                <circle cx="60" cy="45" r="30" stroke-width="1.5" stroke-dasharray="10 4" opacity="0.3"/>
                <path d="M40 25 H80 V32 Q80 45 68 55 V75 L74 85 H46 L52 75 V55 Q40 45 40 32 Z" stroke-width="2.5" fill="rgba(255,255,255,0.08)"/>
                <path d="M40 32 C40 36, 80 36, 80 32" stroke-width="1.5"/>
                <path d="M45 32 L52 55 M75 32 L68 55 M60 32 L60 55" stroke-width="1" opacity="0.6"/>
                <path d="M22 45 Q15 45 18 35 M98 45 Q105 45 102 35" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
              </svg>
            </div>
            <span class="genre-name">Afrobeats</span>
          </div>
          <div class="genre-tile hip-hop">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <rect x="25" y="32" width="70" height="46" rx="6" stroke-width="2.5" fill="rgba(255,255,255,0.06)"/>
                <rect x="35" y="44" width="50" height="22" rx="3" stroke-width="1.5" opacity="0.7"/>
                <circle cx="50" cy="55" r="6" stroke-width="1.5"/>
                <circle cx="70" cy="55" r="6" stroke-width="1.5"/>
                <path d="M15 45 L10 50 L15 55 M105 45 L110 50 L105 55" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
                <line x1="50" y1="51" x2="50" y2="59" stroke-width="1.5"/>
                <line x1="46" y1="55" x2="54" y2="55" stroke-width="1.5"/>
                <line x1="70" y1="51" x2="70" y2="59" stroke-width="1.5"/>
                <line x1="66" y1="55" x2="74" y2="55" stroke-width="1.5"/>
              </svg>
            </div>
            <span class="genre-name">Hip-hop</span>
          </div>
          <div class="genre-tile rb">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <circle cx="60" cy="50" r="42" stroke-width="2" fill="rgba(0,0,0,0.2)"/>
                <circle cx="60" cy="50" r="32" stroke-width="1" opacity="0.5"/>
                <circle cx="60" cy="50" r="22" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
                <circle cx="60" cy="50" r="12" stroke-width="1.5" fill="rgba(255,255,255,0.1)"/>
                <circle cx="60" cy="50" r="3" fill="currentColor"/>
                <path d="M96 24 L86 28 L86 48 L76 56" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
                <path d="M25 90 Q40 80 60 90 T95 90" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
              </svg>
            </div>
            <span class="genre-name">R&B</span>
          </div>
          <div class="genre-tile amapiano">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <circle cx="60" cy="55" r="45" stroke-width="1" opacity="0.15"/>
                <path d="M20 70 Q40 40 60 70 T100 70" stroke-width="2.5" opacity="0.6"/>
                <path d="M25 78 Q40 54 60 78 T95 78" stroke-width="1.5" opacity="0.3"/>
                <rect x="42" y="24" width="8" height="24" rx="1" stroke-width="1.5" fill="currentColor"/>
                <rect x="52" y="24" width="8" height="24" rx="1" stroke-width="1.5" fill="currentColor"/>
                <rect x="62" y="24" width="8" height="24" rx="1" stroke-width="1.5" fill="currentColor"/>
                <rect x="72" y="24" width="8" height="24" rx="1" stroke-width="1.5" fill="currentColor"/>
                <line x1="50" y1="24" x2="50" y2="38" stroke-width="2"/>
                <line x1="60" y1="24" x2="60" y2="38" stroke-width="2"/>
                <line x1="70" y1="24" x2="70" y2="38" stroke-width="2"/>
              </svg>
            </div>
            <span class="genre-name">Amapiano</span>
          </div>
          <div class="genre-tile gospel">
            <div class="check-icon"></div>
            <div class="genre-illustration">
              <svg viewBox="0 0 120 120" fill="none" stroke="currentColor">
                <line x1="60" y1="50" x2="60" y2="15" stroke-width="1" stroke-dasharray="3 3" opacity="0.4"/>
                <line x1="60" y1="50" x2="25" y2="25" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
                <line x1="60" y1="50" x2="95" y2="25" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
                <line x1="60" y1="50" x2="20" y2="50" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
                <line x1="60" y1="50" x2="100" y2="50" stroke-width="1" stroke-dasharray="3 3" opacity="0.3"/>
                <path d="M40 70 V38 Q40 35 43 35 T46 38 V70" stroke-width="1.5" fill="rgba(255,255,255,0.05)"/>
                <path d="M50 75 V28 Q50 25 53 25 T56 28 V75" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
                <path d="M60 78 V20 Q60 17 63 17 T66 20 V78" stroke-width="2" fill="rgba(255,255,255,0.1)"/>
                <path d="M70 75 V28 Q70 25 73 25 T76 28 V75" stroke-width="1.5" fill="rgba(255,255,255,0.08)"/>
                <path d="M80 70 V38 Q80 35 83 35 T86 38 V70" stroke-width="1.5" fill="rgba(255,255,255,0.05)"/>
                <path d="M30 82 Q60 90 90 82" stroke-width="2" opacity="0.4"/>
              </svg>
            </div>
            <span class="genre-name">Gospel</span>
          </div>
        </div>
      </section>

      <!-- Step 3 -->
      <section class="step" id="step3">
        <h1 class="title">How do you want to feel?</h1>
        <p class="subtitle">Set the mood for your study session.</p>
        <div class="mood-pills">
          <button class="mood-pill">Calm</button>
          <button class="mood-pill">Catchy</button>
          <button class="mood-pill">Emotional</button>
          <button class="mood-pill">Hype</button>
        </div>
      </section>
    </main>

    <footer class="onboarding-footer">
      <button class="btn-primary" id="nextBtn">Continue</button>
    </footer>
  </div>
  <script type="module" src="onboarding.js"></script>
</body>
</html>
