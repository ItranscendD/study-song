<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudySong - Input Notes</title>
  <link rel="stylesheet" href="input.css">
</head>
<body>
  <div class="app-container">
    
    <!-- Top Header -->
    <header class="input-header">
      <div class="step-info">
        <button class="btn-back" onclick="window.location.href='home.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <span class="step-text">Step 1 of 3</span>
        <div style="width: 24px;"></div> <!-- Spacer for centering -->
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="input-content">
      
      <!-- Text Area -->
      <div class="textarea-container">
        <textarea id="noteInput" class="note-input" placeholder="Paste or type your notes here..."></textarea>
        <div class="char-count" id="charCount">0 / 3000</div>
      </div>

      <!-- Input Methods Grid -->
      <div class="input-methods-grid">
        <button class="method-btn">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          </div>
          <span class="label">Upload document</span>
        </button>
        
        <button class="method-btn">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
          </div>
          <span class="label">Scan handwriting</span>
        </button>
        
        <button class="method-btn">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
          </div>
          <span class="label">Voice record</span>
        </button>
        
        <button class="method-btn">
          <div class="icon-circle">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
          </div>
          <span class="label">Try sample notes</span>
        </button>
      </div>

    </main>

    <!-- Bottom Action -->
    <footer class="input-footer">
      <button class="btn-primary" id="processBtn" disabled>
        Process my notes <span class="arrow">→</span>
      </button>
    </footer>
    
  </div>
  <script type="module" src="input.js"></script>
</body>
</html>
