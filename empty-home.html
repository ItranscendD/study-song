<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StudySong — Make Your First Song</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: var(--surface-bg);
      --surface: var(--surface-card);
      --accent: var(--color-primary);
      --accent-glow: rgba(124, 77, 255, 0.35);
      --accent-soft: var(--color-primary-soft);
      --text-muted: var(--text-muted);
    }

    html, body {
      height: 100%;
      background: #08080A;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Mobile frame ── */
    .phone {
      width: 390px;
      height: 844px;
      background: var(--bg);
      border-radius: 44px;
      border: 8px solid #222;
      box-shadow: 0 0 80px rgba(0,0,0,0.7), 0 0 0 1px #333 inset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    /* ambient glows */
    .phone::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 280px 220px at 50% 20%, rgba(124,77,255,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 220px 180px at 80% 90%, rgba(124,77,255,0.10) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Content wrapper ── */
    .screen {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      width: 100%;
      padding: 0 2rem;
      gap: 0;
    }

    /* ── Illustration ── */
    .illus-wrap {
      position: relative;
      width: 200px;
      height: 200px;
      margin-bottom: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Soft pulsing halo */
    .illus-wrap::before, .illus-wrap::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,77,255,0.22) 0%, transparent 70%);
      animation: halo 3s ease-in-out infinite;
    }
    .illus-wrap::before { width: 200px; height: 200px; animation-delay: 0s; }
    .illus-wrap::after  { width: 160px; height: 160px; animation-delay: 1.5s; opacity: 0.7; }

    @keyframes halo {
      0%, 100% { transform: scale(0.92); opacity: 0.6; }
      50%       { transform: scale(1.08); opacity: 1; }
    }

    /* SVG canvas */
    .illus-svg {
      position: relative;
      z-index: 2;
      width: 130px;
      height: 130px;
      filter: drop-shadow(0 0 20px rgba(124,77,255,0.5));
    }

    /* Notebook body */
    .notebook {
      animation: notebookBob 4s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes notebookBob {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    /* Lines on notebook — draw in */
    .notebook-line {
      stroke-dasharray: 30;
      stroke-dashoffset: 30;
      animation: drawLine 0.6s ease forwards;
    }
    .notebook-line:nth-child(1) { animation-delay: 0.3s; }
    .notebook-line:nth-child(2) { animation-delay: 0.5s; }
    .notebook-line:nth-child(3) { animation-delay: 0.7s; }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* Headphones morph in */
    .headphones {
      opacity: 0;
      animation: morphIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.1s forwards;
      transform-origin: center;
    }
    @keyframes morphIn {
      0%   { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Musical note orbiting */
    .orbit-group {
      animation: orbit 5s linear infinite;
      transform-origin: 65px 65px;
    }
    @keyframes orbit {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .orbit-note {
      animation: noteCounter 5s linear infinite;
      transform-origin: 104px 26px;
    }
    @keyframes noteCounter {
      from { transform: rotate(0deg); }
      to   { transform: rotate(-360deg); }
    }

    /* Sparkle dots */
    .spark {
      animation: sparkle 2s ease-in-out infinite;
    }
    .spark:nth-of-type(1) { animation-delay: 0s; }
    .spark:nth-of-type(2) { animation-delay: 0.7s; }
    .spark:nth-of-type(3) { animation-delay: 1.4s; }

    @keyframes sparkle {
      0%, 100% { opacity: 0.2; r: 2px; }
      50%       { opacity: 1;   r: 3.5px; }
    }

    /* ── Typography ── */
    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--text-primary);
      text-align: center;
      letter-spacing: -0.3px;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .subline {
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.55;
      max-width: 220px;
    }

    /* ── CTA ── */
    .cta-wrap {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 1.5rem 3rem;
      z-index: 2;
    }

    .btn-cta {
      width: 100%;
      padding: 18px;
      border-radius: var(--radius-pill);
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      box-shadow: 0 12px 32px rgba(124,77,255,0.45);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 0.2px;
    }

    .btn-cta::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 55%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.18), transparent);
      transform: skewX(-20deg);
      animation: shine 3s ease-in-out infinite;
    }

    @keyframes shine {
      0%   { left: -100%; }
      25%  { left: 180%; }
      100% { left: 180%; }
    }

    .btn-cta:hover  { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(124,77,255,0.55); }
    .btn-cta:active { transform: translateY(1px);  box-shadow: 0 6px 18px rgba(124,77,255,0.4); }

    /* ── Floating pill badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--accent-soft);
      border: 1px solid rgba(124,77,255,0.25);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 11px;
      font-weight: 600;
      color: rgba(124,77,255,0.9);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .badge-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    /* ── Mobile fallback: fill viewport on small screens ── */
    @media (max-width: 430px) {
      html, body { background: var(--bg); }
      .phone {
        width: 100%; height: 100dvh;
        border-radius: 0; border: none;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="phone">

    <!-- Ambient background already via ::before -->

    <div class="screen">

      <!-- Badge -->
      <div class="badge">
        <span class="badge-dot"></span>
        New here
      </div>

      <!-- Illustration -->
      <div class="illus-wrap">
        <svg class="illus-svg" viewBox="0 0 130 130" fill="none" xmlns="http://www.w3.org/2000/svg">

          <!-- Notebook (fades out) -->
          <g class="notebook" style="animation: notebookBob 4s ease-in-out infinite, notebookFade 1.2s ease 0.9s forwards;">
            <!-- Book body -->
            <rect x="28" y="28" width="60" height="74" rx="6" fill="#1E1830" stroke="rgba(124,77,255,0.6)" stroke-width="1.5"/>
            <!-- Spine accent -->
            <rect x="28" y="28" width="10" height="74" rx="4" fill="rgba(124,77,255,0.25)"/>
            <!-- Lines -->
            <line class="notebook-line" x1="46" y1="50" x2="78" y2="50" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
            <line class="notebook-line" x1="46" y1="60" x2="78" y2="60" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
            <line class="notebook-line" x1="46" y1="70" x2="72" y2="70" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round"/>
          </g>

          <!-- Sparkles behind headphones -->
          <circle class="spark" cx="20" cy="38" r="2.5" fill="#A385FF"/>
          <circle class="spark" cx="112" cy="55" r="2" fill="#7C4DFF"/>
          <circle class="spark" cx="25" cy="92" r="2" fill="#C4B0FF"/>

          <!-- Headphones (morph in over notebook) -->
          <g class="headphones">
            <!-- Arc -->
            <path d="M 35 68 Q 35 30 65 30 Q 95 30 95 68" stroke="#A385FF" stroke-width="5" stroke-linecap="round" fill="none"/>
            <!-- Left ear cup -->
            <rect x="22" y="65" width="18" height="26" rx="9" fill="#7C4DFF"/>
            <rect x="26" y="70" width="10" height="16" rx="5" fill="rgba(255,255,255,0.12)"/>
            <!-- Right ear cup -->
            <rect x="90" y="65" width="18" height="26" rx="9" fill="#7C4DFF"/>
            <rect x="94" y="70" width="10" height="16" rx="5" fill="rgba(255,255,255,0.12)"/>
            <!-- Glow on cups -->
            <rect x="22" y="65" width="18" height="26" rx="9" fill="rgba(124,77,255,0.3)" filter="url(#cupGlow)"/>
            <rect x="90" y="65" width="18" height="26" rx="9" fill="rgba(124,77,255,0.3)" filter="url(#cupGlow)"/>
          </g>

          <!-- Orbiting musical note -->
          <g class="orbit-group">
            <g class="orbit-note">
              <text x="100" y="28" font-size="14" fill="#A385FF" opacity="0.9">♪</text>
            </g>
          </g>

          <defs>
            <filter id="cupGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="4" result="blur"/>
              <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
        </svg>
      </div>

      <!-- Text -->
      <h1 class="headline">Make your first song</h1>
      <p class="subline">Paste some notes and we'll do the rest</p>

    </div>

    <!-- CTA pinned to bottom -->
    <div class="cta-wrap">
      <button class="btn-cta" id="cta-create" onclick="window.location.href='input.html'">
        Create a song
      </button>
    </div>

  </div>
</body>
</html>
